<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Découvre ton sujet !</title>
  <style>
    :root{
      --bg:#0f1226;
      --panel:#171b3a;
      --accent:#6ee7ff;
      --accent-2:#ffd166;
      --text:#f7f8ff;
      --muted:#a9b1d6;
      --ok:#7CFC86;
      --danger:#ff6b6b;
      --focus:#ffee00;
      --shadow: 0 12px 30px rgba(0,0,0,.45);
    }
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 50% -200px, #2a2f73 0%, rgba(42,47,115,0) 60%),
        linear-gradient(180deg, #0a0c1c 0%, var(--bg) 35%, #0a0c1c 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .app{
      width:min(920px, 100%);
      display:flex;
      flex-direction:column;
      gap:18px;
    }
    header h1{
      margin:0;
      font-weight:800;
      letter-spacing:.4px;
      font-size:clamp(20px, 2.6vw, 28px);
      display:flex; align-items:center; gap:.5rem;
    }
    header p{
      margin:.25rem 0 0;
      color:var(--muted);
      font-size:14px;
    }
    .machine{
      background:linear-gradient(180deg, #1d224a 0%, var(--panel) 60%);
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:20px;
      box-shadow: var(--shadow);
    }
    .reels{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:14px;
    }
    .reel{
      background: #0d1030;
      border-radius:16px;
      border:2px solid rgba(255,255,255,.1);
      position:relative;
      overflow:hidden;
      min-height:92px;
      display:flex; align-items:center; justify-content:center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.05), inset 0 -30px 40px rgba(0,0,0,.35);
    }
    .reel::before, .reel::after{
      content:"";
      position:absolute; inset:0;
      pointer-events:none;
      border-radius:14px;
    }
    .reel::before{ box-shadow: inset 0 0 40px rgba(110,231,255,.12); }
    .reel.spinning::after{
      background: repeating-linear-gradient(
        90deg,
        transparent 0 14px,
        rgba(255,255,255,.06) 14px 20px
      );
      filter: blur(.4px) brightness(1.05);
      animation: slide 300ms linear infinite;
    }
    @keyframes slide{ to{ transform: translateX(20px); } }
    .value{
      font-weight:800;
      font-size: clamp(20px, 3.5vw, 28px);
      text-transform: none;
      letter-spacing:.2px;
      text-align:center;
      padding:10px 12px;
      line-height:1.15;
      text-shadow: 0 2px 8px rgba(0,0,0,.45);
    }
    .chip{
      position:absolute; top:8px; left:10px;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.15);
      color: var(--muted);
      font-size:12px;
      padding:2px 8px; border-radius:999px;
    }
    .controls{
      display:flex; flex-wrap:wrap; align-items:center; gap:12px;
      margin-top:16px;
    }
    .btn{
      appearance:none;
      border:2px solid var(--accent);
      background: linear-gradient(180deg, #2bdcff 0%, #0bd0ff 60%);
      color:#001018;
      font-weight:900;
      letter-spacing:.3px;
      padding:12px 18px;
      border-radius:999px;
      cursor:pointer;
      box-shadow: 0 10px 22px rgba(11,208,255,.25), inset 0 -4px 10px rgba(0,0,0,.25);
      transition: transform .05s ease, box-shadow .2s ease, filter .2s ease;
    }
    .btn:hover{ filter: brightness(1.05); }
    .btn:active{ transform: translateY(1px); }
    .btn[disabled]{ cursor:not-allowed; filter: grayscale(.3) brightness(.85); opacity:.7; }
    .btn:focus-visible{ outline:3px dashed var(--focus); outline-offset:3px; }

    /* Boutons secondaires pour le chrono (même décor, autre teinte) */
    .btn-secondary{
      border-color: var(--accent-2);
      background: linear-gradient(180deg, #ffe082 0%, var(--accent-2) 60%);
      color:#2a2100;
      box-shadow: 0 10px 22px rgba(255,209,102,.25), inset 0 -4px 10px rgba(0,0,0,.25);
    }

    .toggle{ display:flex; align-items:center; gap:8px; font-size:14px; color:var(--muted); }
    .toggle input{ width:18px; height:18px; }
    .status{ margin-left:auto; font-size:13px; color:var(--muted); }
    .pitch{
      margin:10px 0 0;
      padding:14px 16px;
      border-radius:14px;
      background: rgba(110,231,255,.08);
      border:1px solid rgba(110,231,255,.25);
      box-shadow: inset 0 0 30px rgba(110,231,255,.05);
      font-size:clamp(15px, 2.2vw, 18px);
      line-height:1.35;
      opacity:0;
    }
    .pitch.show{ animation: fadeUp .6s ease both; }

    /* —— Chronomètre —— */
    .timer{
      margin:12px 0 0;
      padding:14px 16px;
      border-radius:14px;
      background: rgba(255,209,102,.08);
      border:1px solid rgba(255,209,102,.35);
      box-shadow: inset 0 0 30px rgba(255,209,102,.06);
      display:flex; flex-wrap:wrap; align-items:center; gap:12px;
    }
    .timer-display{
      font-variant-numeric: tabular-nums;
      font-weight:900;
      letter-spacing:.6px;
      font-size: clamp(22px, 3.4vw, 28px);
      padding:6px 10px;
      border-radius:10px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.1);
      text-shadow: 0 2px 8px rgba(0,0,0,.35);
    }
    .timer-controls{ display:flex; align-items:center; gap:10px; margin-left:auto; }

    .sr-only{ position:absolute !important; height:1px; width:1px; overflow:hidden; clip:rect(1px,1px,1px,1px); white-space:nowrap; }
    @keyframes fadeUp{ from{ opacity:0; transform: translateY(8px);} to{ opacity:1; transform: translateY(0);} }
    @media (prefers-reduced-motion: reduce){
      *{ animation: none !important; transition: none !important; }
      .reel.spinning::after{ display:none; }
    }
  </style>
</head>
<body>
  <main class="app" role="main" aria-label="Application de tirage de sujets">
    <header>
      <h1>Découvre ton sujet !</h1>
      <p>Appuyez sur <strong>Lancer</strong> (ou Entrée/Espace). Les roues s’arrêtent l’une après l’autre, puis la consigne apparaît.</p>
    </header>

    <section class="machine" role="group" aria-label="Machine à sous créative" aria-busy="false">
      <div class="reels" id="reels">
        <div class="reel" id="reel-secteur" aria-label="Roue 1 — Secteur" aria-live="off" aria-atomic="true">
          <span class="chip">Secteur</span>
          <div class="value" id="value-secteur">—</div>
        </div>
        <div class="reel" id="reel-element" aria-label="Roue 2 — Ressource" aria-live="off" aria-atomic="true">
          <span class="chip">Ressource</span>
          <div class="value" id="value-element">—</div>
        </div>
        <div class="reel" id="reel-verbe" aria-label="Roue 3 — Verbe" aria-live="off" aria-atomic="true">
          <span class="chip">Verbe</span>
          <div class="value" id="value-verbe">—</div>
        </div>
      </div>

      <div class="controls">
        <button id="spinBtn" class="btn" type="button" aria-label="Lancer le tirage (Entrée ou Espace)">Lancer</button>
        <label class="toggle" for="sound">
          <input type="checkbox" id="sound" aria-label="Activer le son" checked />
          🔊 Son
        </label>
        <div id="status" class="status" aria-live="polite">Prêt</div>
      </div>

      <p id="pitch" class="pitch" role="status" aria-live="polite" aria-atomic="true" aria-relevant="text"></p>
      <span id="sr-hint" class="sr-only" aria-live="polite"></span>

      <!-- —— Chronomètre (ajouté) —— -->
      <div class="timer" id="timer" role="group" aria-label="Chronomètre">
        <div class="timer-display" id="timer-display" aria-live="polite" aria-atomic="true">00:00</div>
        <div class="timer-controls">
          <button id="timer-start" class="btn btn-secondary" type="button" aria-label="Démarrer le chronomètre">Démarrer</button>
          <button id="timer-stop" class="btn btn-secondary" type="button" aria-label="Arrêter le chronomètre" disabled>Arrêter</button>
          <button id="timer-reset" class="btn btn-secondary" type="button" aria-label="Réinitialiser le chronomètre">Réinitialiser</button>
        </div>
      </div>
    </section>


  </main>

  <script>
    // ————————————————————————————————
    // Source de vérité (NE PAS MODIFIER)
    // ————————————————————————————————
    const DATA = {
      "sujets": [
        { "id": 1, "secteur": "Agriculture",   "element": "Souveraineté alimentaire", "verbe": "proposer",   "pitch": "Vous devez proposer un projet innovant pour garantir la souveraineté alimentaire face aux défis mondiaux." },
        { "id": 2, "secteur": "Environnement", "element": "Drones",                    "verbe": "protéger",   "pitch": "Vous devez protéger les écosystèmes en intégrant l’élément « drones »" },
        { "id": 3, "secteur": "Santé",         "element": "Robot",                     "verbe": "intégrer",   "pitch": "Vous devez intégrer des robots ambulanciers autonomes dans les services d’urgence." },
        { "id": 4, "secteur": "Tourisme",      "element": "Application",               "verbe": "réinventer", "pitch": "Vous devez réinventer le secteur du tourisme en intégrant l’élément « application »" },
        { "id": 5, "secteur": "Économie",      "element": "Cryptomonnaie",             "verbe": "développer", "pitch": "Vous devez développer un projet facilitant le commerce international entre petites entreprises grâce à une « cryptomonnaie universelle »." },
        { "id": 6, "secteur": "Société",       "element": "Consommation décarbonée",   "verbe": "encourager", "pitch": "Vous devez encourager un changement sociétal en intégrant l’élément « consommation décarbonée »." }
      ]
    };

    // DOM
    const $machine = document.querySelector('.machine');
    const $btn = document.getElementById('spinBtn');
    const $status = document.getElementById('status');
    const $pitch = document.getElementById('pitch');
    const $srHint = document.getElementById('sr-hint');
    const reels = [
      { box: document.getElementById('reel-secteur'), valueEl: document.getElementById('value-secteur') },
      { box: document.getElementById('reel-element'), valueEl: document.getElementById('value-element') },
      { box: document.getElementById('reel-verbe'), valueEl: document.getElementById('value-verbe') },
    ];
    const soundToggle = document.getElementById('sound');

    // Chronomètre — DOM
    const $timerDisplay = document.getElementById('timer-display');
    const $timerStart = document.getElementById('timer-start');
    const $timerStop = document.getElementById('timer-stop');
    const $timerReset = document.getElementById('timer-reset');

    // État & accessibilité
    let isSpinning = false;
    let hasSpun = false;
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Pools pour l’illusion de rotation
    const sectors = Array.from(new Set(DATA.sujets.map(s => s.secteur)));
    const elements = Array.from(new Set(DATA.sujets.map(s => s.element)));
    const verbs = Array.from(new Set(DATA.sujets.map(s => s.verbe)));

    // Son minimal
    let audioCtx = null;
    function beep(freq = 760, duration = 110){
      if(!soundToggle?.checked) return;
      try{
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.value = freq;
        g.gain.value = 0.06;
        o.connect(g); g.connect(audioCtx.destination);
        o.start();
        setTimeout(()=>{ o.stop(); }, duration);
      }catch(e){}
    }

    // Utils
    const pickSubject = () => DATA.sujets[Math.floor(Math.random() * DATA.sujets.length)];


    // Capitalisation d'affichage uniquement
    function capitalizeFirst(str){
      if(!str) return str;
      const leadingSpaces = str.match(/^\s*/)[0];
      const trimmed = str.trimStart();
      const first = trimmed.charAt(0).toLocaleUpperCase('fr-FR');
      return leadingSpaces + first + trimmed.slice(1);
    }

    function setBusy(busy){
      isSpinning = busy;
      $machine.setAttribute('aria-busy', String(busy));
      $btn.disabled = busy;
      $status.textContent = busy ? 'Tirage en cours…' : 'Prêt';
    }
    function updateSRHint(msg){ $srHint.textContent = msg; }

    // Spin + arrêt séquentiel
    function spinOnce(){
      if(isSpinning) return;
      setBusy(true);
      $pitch.classList.remove('show');
      $pitch.textContent = '';

      const subject = pickSubject();
      if(!subject){
        console.error('Aucun sujet disponible.');
        reels.forEach((_, i) => reels[i].box.classList.remove('spinning'));
        setBusy(false);
        return;
      }

      const base = reduceMotion ? 220 : 1100;
      const step = reduceMotion ? 120 : 650;
      const durations = [base, base + step, base + step*2];

      const pools = [sectors, elements, verbs];
      const intervals = [];

      reels.forEach((reel, i) => {
        reel.box.classList.add('spinning');
        intervals[i] = setInterval(()=>{
          const arr = pools[i];
          const next = arr[Math.floor(Math.random() * arr.length)];
          reel.valueEl.textContent = next;
        }, reduceMotion ? 120 : 60);
      });

      function stopReel(i, finalVal){
        clearInterval(intervals[i]);
        reels[i].valueEl.textContent = finalVal;
        reels[i].box.classList.remove('spinning');
        beep(640 + i*80, reduceMotion ? 70 : 120);
      }

      setTimeout(()=> stopReel(0, subject.secteur), durations[0]);
      setTimeout(()=> stopReel(1, subject.element), durations[1]);
      setTimeout(()=> {
        stopReel(2, subject.verbe);
        requestAnimationFrame(()=>{
          $pitch.textContent = capitalizeFirst(subject.pitch);
          $pitch.classList.add('show');
          updateSRHint(`Sujet tiré. ${subject.secteur}, ${subject.element}, ${subject.verbe}.`);
          setBusy(false);
          if(!hasSpun){ hasSpun = true; $btn.textContent = 'Relancer'; }
        });
      }, durations[2]);
    }

    // —— Chronomètre ——
    let timerInterval = null;
    let elapsedMs = 0; // stocke le temps écoulé en ms

    function formatTime(ms){
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60).toString().padStart(2,'0');
      const seconds = (totalSeconds % 60).toString().padStart(2,'0');
      return `${minutes}:${seconds}`;
    }

    function renderTimer(){
      $timerDisplay.textContent = formatTime(elapsedMs);
    }

    function startTimer(){
      if(timerInterval) return; // déjà en marche
      const start = performance.now() - elapsedMs;
      $timerStart.disabled = true;
      $timerStop.disabled = false;
      timerInterval = setInterval(()=>{
        elapsedMs = Math.max(0, performance.now() - start);
        renderTimer();
      }, 250);
    }

    function stopTimer(){
      if(!timerInterval) return;
      clearInterval(timerInterval);
      timerInterval = null;
      $timerStart.disabled = false;
      $timerStop.disabled = true;
    }

    function resetTimer(){
      elapsedMs = 0;
      renderTimer();
    }

    // Liens boutons chrono
    $timerStart.addEventListener('click', startTimer);
    $timerStop.addEventListener('click', stopTimer);
    $timerReset.addEventListener('click', resetTimer);

    // Raccourcis clavier du chrono (facultatif)
    document.addEventListener('keydown', (e)=>{
      if(e.altKey || e.metaKey || e.ctrlKey) return;
      if(e.key.toLowerCase() === 't'){ // T pour start/stop
        if(timerInterval){ stopTimer(); } else { startTimer(); }
      }
      if(e.key.toLowerCase() === 'r'){ // R pour reset
        resetTimer();
      }
    });

    // Interactions existantes
    document.getElementById('spinBtn').addEventListener('click', spinOnce);
    document.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); spinOnce(); }
    });

    // Init placeholders & timer
    (function init(){
      reels[0].valueEl.textContent = 'Secteur';
      reels[1].valueEl.textContent = 'Ressource';
      reels[2].valueEl.textContent = 'Verbe';
      renderTimer();
    })();

    // Activer audio au premier clic si nécessaire
    window.addEventListener('pointerdown', ()=> {
      if(audioCtx && audioCtx.state === 'suspended'){ audioCtx.resume().catch(()=>{}); }
    }, { once:true });
  </script>
</body>
</html>
